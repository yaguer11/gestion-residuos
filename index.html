<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gestión de Residuos Urbanos</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>♻️</text></svg>" />
    <link rel="icon" type="image/png" href="/gestion-residuos/logoUNVIME.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;600;700&family=Space+Grotesk:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: radial-gradient(
          circle at top,
          #0f172a 0%,
          #0a0e1a 55%,
          #060810 100%
        );
        font-family: "Rubik", sans-serif;
        overflow: hidden;
      }
      .intro-card {
        animation: intro-fade 0.35s ease-out;
      }
      .intro-overlay {
        animation: intro-backdrop 0.3s ease-out;
      }
      .intro-content {
        grid-template-columns: 1fr;
      }
      .intro-schema {
        justify-self: stretch;
      }
      @keyframes step-reveal {
        from {
          transform: translateY(6px);
          opacity: 0;
        }
        to {
          transform: translateY(0);
          opacity: 1;
        }
      }
      @media (min-width: 820px) {
        .intro-content {
          grid-template-columns: minmax(0, 1.2fr) minmax(0, 0.8fr);
        }
        .intro-schema {
          max-width: 520px;
        }
      }
      @media (min-width: 1100px) {
        .intro-content {
          grid-template-columns: minmax(0, 1.4fr) minmax(0, 0.9fr);
        }
      }
      @keyframes intro-fade {
        from {
          transform: translateY(12px) scale(0.98);
          opacity: 0;
        }
        to {
          transform: translateY(0) scale(1);
          opacity: 1;
        }
      }
      @keyframes intro-backdrop {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }
    </style>
    <script type="module" crossorigin src="/gestion-residuos/assets/index-DVZ6X5M8.js"></script>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
